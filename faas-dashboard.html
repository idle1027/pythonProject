<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 FaaS 在线编辑器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/dracula.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --bg-tertiary: #2d2d2d;
            --text-primary: #cccccc;
            --text-secondary: #858585;
            --accent: #007acc;
            --accent-hover: #005a9e;
            --border: #3c3c3c;
            --success: #4ec9b0;
            --warning: #dcdcaa;
            --error: #f48771;
            --info: #75beff;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部工具栏 */
        .toolbar {
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 48px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .logo span {
            font-size: 20px;
        }

        .toolbar-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toolbar-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .toolbar-input-group label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .toolbar-input-group input,
        .toolbar-input-group select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 12px;
        }

        .toolbar-input-group input[type="number"] {
            width: 60px;
        }

        .toolbar-input-group select {
            cursor: pointer;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            border: none;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-danger:hover {
            background: #d6403a;
        }

        /* 主布局 */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左侧面板 */
        .left-panel {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .panel-section {
            border-bottom: 1px solid var(--border);
        }

        .panel-header {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
        }

        .panel-header .refresh-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .panel-header .refresh-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 12px;
        }

        .stat-card {
            background: var(--bg-primary);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
        }

        /* 任务列表 */
        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .task-item {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-item:hover {
            border-color: var(--accent);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .task-id {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .task-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .task-status.waiting {
            background: var(--warning);
            color: #1e1e1e;
        }

        .task-status.running {
            background: var(--accent);
            color: white;
        }

        .task-status.finished {
            background: var(--success);
            color: #1e1e1e;
        }

        .task-status.failed {
            background: var(--error);
            color: white;
        }

        .task-status.cancelled {
            background: var(--text-secondary);
            color: white;
        }

        .task-meta {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* 中间编辑器 */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            flex-shrink: 0;
            min-width: 0;
        }

        .editor-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
        }

        .editor-title {
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .editor-actions {
            display: flex;
            gap: 8px;
        }

        .CodeMirror {
            height: 100%;
            font-size: 14px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            line-height: 1.6;
        }

        .CodeMirror-gutters {
            border-right: 1px solid var(--border);
        }

        /* 右侧输出面板 */
        .output-panel {
            width: 400px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .output-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
        }

        .output-title {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .output-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        #result {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-primary);
        }

        .result-success {
            color: var(--success);
        }

        .result-error {
            color: var(--error);
        }

        .result-info {
            color: var(--info);
        }

        /* 底部状态栏 */
        .status-bar {
            background: var(--accent);
            color: white;
            padding: 4px 16px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .left-panel {
                width: 250px;
            }
            .output-panel {
                width: 300px;
            }
        }

        @media (max-width: 768px) {
            .left-panel {
                display: none;
            }
            .output-panel {
                width: 250px;
            }
            .toolbar {
                padding: 8px;
            }
            .toolbar-input-group {
                display: none;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* 模板选择器 */
        #template-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        #template-select:hover {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <!-- 顶部工具栏 -->
    <div class="toolbar">
        <div class="logo">
            <span>🚀</span>
            <span>FaaS 在线编辑器</span>
        </div>
        
        <div class="toolbar-actions">
            <select id="template-select" onchange="loadTemplate()">
                <option value="">📁 选择模板...</option>
                <option value="hello">Hello World</option>
                <option value="fibonacci">斐波那契数列</option>
                <option value="sort">排序算法</option>
                <option value="data">数据处理</option>
            </select>
            
            <div class="toolbar-input-group">
                <label for="user_id">用户ID:</label>
                <input type="text" id="user_id" value="user1" placeholder="请输入用户ID">
            </div>
            
            <div class="toolbar-input-group">
                <label for="timeout">超时:</label>
                <input type="number" id="timeout" value="10" min="1" max="300">
            </div>
            
            <button class="btn btn-primary" onclick="runCode()">
                <span>▶</span> 运行
            </button>
            
            <button class="btn btn-secondary" onclick="clearOutput()">
                <span>🗑️</span> 清除
            </button>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <!-- 统计信息 -->
            <div class="panel-section">
                <div class="panel-header">
                    <span>📊 系统统计</span>
                    <button class="refresh-btn" onclick="loadStats()" title="刷新统计">🔄</button>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">总任务数</div>
                        <div class="stat-value" id="total">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">运行中</div>
                        <div class="stat-value" id="running">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">等待中</div>
                        <div class="stat-value" id="waiting">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">已完成</div>
                        <div class="stat-value" id="finished">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">已取消</div>
                        <div class="stat-value" id="cancelled">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">失败</div>
                        <div class="stat-value" id="failed">0</div>
                    </div>
                    <div class="stat-card" style="grid-column: span 2;">
                        <div class="stat-label">平均耗时</div>
                        <div class="stat-value" id="avg_time">0.00s</div>
                    </div>
                </div>
            </div>

            <!-- 任务列表 -->
            <div class="panel-section" style="flex: 1; display: flex; flex-direction: column;">
                <div class="panel-header">
                    <span>📋 任务列表</span>
                    <div>
                        <button class="refresh-btn" onclick="loadTasks()" title="刷新任务">🔄</button>
                        <button class="refresh-btn" onclick="clearFinishedTasks()" title="清除已完成">🗑️</button>
                    </div>
                </div>
                <div class="task-list" id="task-list">
                    <!-- 任务项将动态添加到这里 -->
                </div>
            </div>
        </div>

        <!-- 中间编辑器 -->
        <div class="editor-container">
            <div class="editor-header">
                <div class="editor-title">
                    <span>📝</span>
                    <span>main.py</span>
                </div>
                <div class="editor-actions">
                    <button class="btn btn-secondary" onclick="copyCode()">
                        <span>📋</span> 复制
                    </button>
                </div>
            </div>
            <div id="code-editor"></div>
        </div>

        <!-- 右侧输出面板 -->
        <div class="output-panel">
            <div class="output-header">
                <div class="output-title">📤 执行结果</div>
                <button class="refresh-btn" onclick="clearOutput()" title="清除输出">🗑️</button>
            </div>
            <div class="output-content">
                <pre id="result"></pre>
            </div>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <div class="status-item">
            <span>✓</span>
            <span>就绪</span>
        </div>
        <div class="status-item">
            <span>🖥️</span>
            <span>Python 3.10</span>
        </div>
        <div class="status-item" id="status-message">
            <span>等待执行...</span>
        </div>
    </div>

    <!-- CodeMirror 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/python/python.min.js"></script>

    <script>
        // 初始化编辑器
        const editor = CodeMirror(document.getElementById('code-editor'), {
            mode: 'python',
            theme: 'dracula',
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            indentWithTabs: false,
            lineWrapping: true,
            value: `print("Hello FaaS Platform")

# 在这里编写你的代码
# 支持多行代码和复杂逻辑

def greet(name):
    return f"Hello, {name}!"

print(greet("World"))
`
        });

        // 代码模板
        const templates = {
            hello: `print("Hello FaaS Platform")

# 简单的 Hello World 示例
name = "World"
print(f"Hello, {name}!")`,
            fibonacci: `def fibonacci(n):
    """计算斐波那契数列"""
    if n <= 1:
        return n
    return fibonacci(n-1) + fibonacci(n-2)

# 计算前 10 个斐波那契数
print("斐波那契数列前 10 项:")
for i in range(10):
    print(f"F({i}) = {fibonacci(i)}")`,
            sort: `def bubble_sort(arr):
    """冒泡排序算法"""
    n = len(arr)
    for i in range(n):
        for j in range(0, n-i-1):
            if arr[j] > arr[j+1]:
                arr[j], arr[j+1] = arr[j+1], arr[j]
    return arr

# 测试排序
data = [64, 34, 25, 12, 22, 11, 90]
print(f"排序前: {data}")
sorted_data = bubble_sort(data.copy())
print(f"排序后: {sorted_data}")`,
            data: `import json

# 示例数据处理
data = [
    {"name": "张三", "age": 25, "city": "北京"},
    {"name": "李四", "age": 30, "city": "上海"},
    {"name": "王五", "age": 28, "city": "广州"}
]

# 过滤年龄大于 25 岁的人
filtered = [p for p in data if p["age"] > 25]
print(f"年龄大于 25 岁的人: {json.dumps(filtered, ensure_ascii=False)}")

# 统计各城市人数
cities = {}
for p in data:
    cities[p["city"]] = cities.get(p["city"], 0) + 1
print(f"各城市人数: {cities}")`
        };

        // 全局变量
        let lastTask = "";
        let updateInterval = null;

        // 加载模板
        function loadTemplate() {
            const select = document.getElementById('template-select');
            if (select.value && templates[select.value]) {
                editor.setValue(templates[select.value]);
            }
        }

        // 更新状态栏
        function updateStatus(message, type = 'info') {
            const statusElement = document.getElementById('status-message');
            statusElement.innerHTML = `<span>${message}</span>`;
            
            const statusBar = document.querySelector('.status-bar');
            if (type === 'error') {
                statusBar.style.background = 'var(--error)';
            } else if (type === 'success') {
                statusBar.style.background = 'var(--success)';
            } else {
                statusBar.style.background = 'var(--accent)';
            }
        }

        // 恢复状态栏颜色
        function resetStatusBar() {
            const statusBar = document.querySelector('.status-bar');
            statusBar.style.background = 'var(--accent)';
        }

        // 复制代码
        function copyCode() {
            navigator.clipboard.writeText(editor.getValue()).then(() => {
                updateStatus('✓ 代码已复制到剪贴板', 'success');
                setTimeout(resetStatusBar, 2000);
            }).catch(err => {
                updateStatus('✗ 复制失败: ' + err.message, 'error');
                setTimeout(resetStatusBar, 2000);
            });
        }

        // 清除输出
        function clearOutput() {
            document.getElementById('result').innerHTML = '';
            document.getElementById('result').className = '';
        }

        // 运行代码
        async function runCode() {
            console.log("runCode() 被调用");

            let userId = document.getElementById("user_id").value;
            let code = editor.getValue();
            let timeout = parseInt(document.getElementById("timeout").value);

            console.log("参数:", { userId, codeLength: code.length, timeout });

            if (!userId) {
                alert("请输入用户ID");
                return;
            }

            if (timeout < 1 || timeout > 300) {
                alert("超时时间必须在1-300秒之间");
                return;
            }

            document.getElementById('result').innerHTML = '<span class="result-info"><span class="loading"></span> 正在提交任务...</span>';
            updateStatus('🚀 正在提交任务...', 'info');

            try {
                console.log("发送请求到 http://127.0.0.1:8000/run");

                let res = await fetch("http://127.0.0.1:8000/run", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        code: code,
                        priority: 5,
                        timeout: timeout
                    })
                });

                console.log("响应状态:", res.status, res.statusText);

                if (!res.ok) {
                    throw new Error(`HTTP错误! 状态码: ${res.status}`);
                }

                let data = await res.json();

                console.log("响应数据:", data);

                if (data.error) {
                    throw new Error(data.error);
                }

                lastTask = data.task_id;
                document.getElementById('result').innerHTML = `
<span class="result-info">✓ 任务已提交</span>
<span class="result-info">任务ID: ${lastTask}</span>
<span class="result-info">正在等待执行结果...</span>
                `;
                updateStatus('⏳ 任务执行中...', 'info');
                
                // 启动实时更新
                startRealTimeUpdates();
                
                // 2秒后获取结果
                setTimeout(getResult, 2000);

            } catch (error) {
                console.error("错误:", error);
                document.getElementById('result').innerHTML = `<span class="result-error">✗ 提交失败: ${error.message}</span>`;
                updateStatus('✗ 提交失败', 'error');
                setTimeout(resetStatusBar, 3000);
                alert("提交失败: " + error.message);
            }
        }

        // 获取结果
        async function getResult() {
            if (!lastTask) return;

            let res = await fetch("http://127.0.0.1:8000/result/" + lastTask);
            let data = await res.json();

            let displayData = Object.assign({}, data);

            // 格式化时间戳
            if (displayData.created_at) displayData.created_at = displayData.created_at.replace("T", " ").slice(0, 19);
            if (displayData.started_at) displayData.started_at = displayData.started_at.replace("T", " ").slice(0, 19);
            if (displayData.finished_at) displayData.finished_at = displayData.finished_at.replace("T", " ").slice(0, 19);

            // 格式化执行时间
            if (displayData.execution_time !== null && displayData.execution_time !== undefined) {
                displayData.execution_time = displayData.execution_time.toFixed(2) + "s";
            }

            // 根据状态显示不同颜色
            let statusClass = '';
            if (displayData.status === 'finished') {
                statusClass = 'result-success';
                updateStatus('✓ 执行成功', 'success');
            } else if (displayData.status === 'failed') {
                statusClass = 'result-error';
                updateStatus('✗ 执行失败', 'error');
            } else {
                updateStatus('⏳ 执行中...', 'info');
            }

            document.getElementById('result').innerHTML = `<pre class="${statusClass}">${JSON.stringify(displayData, null, 2)}</pre>`;
            
            // 如果任务还在执行，继续轮询
            if (displayData.status === 'running' || displayData.status === 'waiting') {
                setTimeout(getResult, 2000);
            } else {
                stopRealTimeUpdates();
                setTimeout(resetStatusBar, 3000);
            }
        }

        // 实时更新
        function startRealTimeUpdates() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                loadStats();
                loadTasks();
            }, 3000);
        }

        function stopRealTimeUpdates() {
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }
        }

        // 加载任务列表
        async function loadTasks() {
            try {
                let res = await fetch("http://127.0.0.1:8000/tasks");
                let data = await res.json();
                
                const taskList = document.getElementById('task-list');
                
                if (data.tasks && data.tasks.length > 0) {
                    taskList.innerHTML = data.tasks.map(task => `
                        <div class="task-item">
                            <div class="task-header">
                                <span class="task-id">${task.task_id.substring(0, 8)}...</span>
                                <span class="task-status ${task.status}">${task.status}</span>
                            </div>
                            <div class="task-meta">
                                用户: ${task.user_id} | 优先级: ${task.priority} | 
                                ${task.execution_time ? '耗时: ' + task.execution_time.toFixed(2) + 's' : '等待中...'}
                            </div>
                        </div>
                    `).join('');
                } else {
                    taskList.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无任务</div>';
                }
            } catch (error) {
                console.error('加载任务失败:', error);
            }
        }

        // 加载统计信息
        async function loadStats() {
            try {
                let res = await fetch("http://127.0.0.1:8000/tasks");
                let data = await res.json();

                let tasks = data.tasks;
                let running = 0, waiting = 0, finished = 0, cancelled = 0, failed = 0;
                let totalTime = 0, completedCount = 0;

                for (let t of tasks) {
                    if (t.status === "running") running++;
                    if (t.status === "waiting") waiting++;
                    if (t.status === "finished") {
                        finished++;
                        if (t.execution_time) {
                            totalTime += t.execution_time;
                            completedCount++;
                        }
                    }
                    if (t.status === "cancelled") cancelled++;
                    if (t.status === "failed") failed++;
                }

                document.getElementById("total").innerText = tasks.length;
                document.getElementById("running").innerText = running;
                document.getElementById("waiting").innerText = waiting;
                document.getElementById("finished").innerText = finished;
                document.getElementById("cancelled").innerText = cancelled;
                document.getElementById("failed").innerText = failed;

                // 显示平均执行时间
                let avgTime = completedCount > 0 ? (totalTime / completedCount).toFixed(2) : "0.00";
                document.getElementById("avg_time").innerText = avgTime + "s";
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 清除已完成任务
        async function clearFinishedTasks() {
            if (!confirm("确定要清除所有已完成的任务吗？")) {
                return;
            }

            try {
                let res = await fetch("http://127.0.0.1:8000/clear-finished", {
                    method: "DELETE"
                });
                let data = await res.json();
                
                alert(data.message + "\n已清除 " + data.deleted_count + " 个任务");
                
                loadTasks();
                loadStats();
            } catch (error) {
                console.error('清除任务失败:', error);
                alert('清除任务失败: ' + error.message);
            }
        }

        // 页面加载时初始化
        window.addEventListener('load', function() {
            loadStats();
            loadTasks();
        });

        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', function() {
            stopRealTimeUpdates();
        });
    </script>
</body>
</html>
